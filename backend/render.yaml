services:
  - type: web
    name: news-credibility-ai
    env: python
    buildCommand: "pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install -r requirements.txt && python -c 'from agent.retriever import build_index; build_index()'"
    startCommand: "uvicorn agent_app:app --host 0.0.0.0 --port $PORT"
